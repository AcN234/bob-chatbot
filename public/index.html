<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BOB AI Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

.chat-container{
width:100%;
max-width:700px;
margin:40px auto;
background:white;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
height:80vh;
}

.header{
background:#111;
color:white;
padding:15px;
font-size:18px;
border-radius:10px 10px 0 0;
}

.chat-box{
flex:1;
padding:20px;
overflow-y:auto;
}

.message{
margin-bottom:15px;
line-height:1.5;
}

.user{
text-align:right;
color:#111;
}

.bot{
text-align:left;
color:#444;
}

.input-area{
display:flex;
border-top:1px solid #eee;
}

input{
flex:1;
padding:15px;
border:none;
font-size:16px;
}

button{
padding:15px 20px;
background:#111;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#333;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="header">
BOB AI Assistant
</div>

<div id="chat-box" class="chat-box"></div>

<div class="input-area">
<input id="user-input" placeholder="Ask a question..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

async function sendMessage(){

const input = document.getElementById("user-input");
const chatBox = document.getElementById("chat-box");

const message = input.value;

if(!message) return;

chatBox.innerHTML += `<div class="message user"><b>You:</b> ${message}</div>`;

input.value="";

chatBox.scrollTop = chatBox.scrollHeight;

const response = await fetch("/api/bob-chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:message
})
});

const data = await response.json();

chatBox.innerHTML += `<div class="message bot"><b>BOB:</b> ${data.reply}</div>`;

chatBox.scrollTop = chatBox.scrollHeight;

}

</script>

</body>
</html>
