<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BOB AI Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

.chat-container{
width:100%;
max-width:700px;
margin:40px auto;
background:white;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
height:80vh;
}

.header{
background:#111;
color:white;
padding:15px;
font-size:18px;
border-radius:10px 10px 0 0;
}

.chat-box{
flex:1;
padding:20px;
overflow-y:auto;
}

.user{
text-align:right;
color:#111;
}

.bot{
text-align:left;
color:#444;
}

.input-area{
display:flex;
border-top:1px solid #eee;
}

input{
flex:1;
padding:15px;
border:none;
font-size:16px;
outline:none;
}

button{
padding:15px 20px;
background:#111;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#333;
}
.typing span{
animation: blink 1.4s infinite;
}

.typing span:nth-child(2){
animation-delay:0.2s;
}

.typing span:nth-child(3){
animation-delay:0.4s;
}

@keyframes blink{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

  .message{
margin-bottom:18px;
line-height:1.6;
font-size:15px;
}

.user{
text-align:right;
}

.user b{
color:#111;
}

.bot{
text-align:left;
background:#f7f7f8;
padding:12px 14px;
border-radius:8px;
border:1px solid #e5e5e5;
}

.bot b{
color:#444;
}

.bot h1,
.bot h2,
.bot h3{
margin-top:10px;
margin-bottom:6px;
}

.bot ul{
padding-left:20px;
margin:8px 0;
}

.bot li{
margin-bottom:5px;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="header">
BOB AI Assistant
</div>

<div id="chat-box" class="chat-box"></div>

<div class="input-area">
<input id="user-input" placeholder="Ask a question..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const input = document.getElementById("user-input");
const chatBox = document.getElementById("chat-box");

input.addEventListener("keypress", function(e){
if(e.key === "Enter"){
sendMessage();
}
});

async function sendMessage(){

const message = input.value.trim();

if(!message) return;

chatBox.innerHTML += `<div class="message user"><b>You:</b> ${message}</div>`;

input.value="";
chatBox.scrollTop = chatBox.scrollHeight;

/* typing indicator */

const typingId = "typing-" + Date.now();

chatBox.innerHTML += `
<div class="message bot" id="${typingId}">
<b>BOB:</b> <span class="typing">typing<span>.</span><span>.</span><span>.</span></span>
</div>
`;

chatBox.scrollTop = chatBox.scrollHeight;

try{

const response = await fetch("/api/bob-chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:message
})
});

const data = await response.json();

const typingElement = document.getElementById(typingId);

if(data.error){
typingElement.innerHTML = `<b>BOB:</b> Error: ${data.error}`;
}else{
typingElement.innerHTML = `<b>BOB:</b> ${formatText(data.reply)}`;
}

}catch(error){

const typingElement = document.getElementById(typingId);
typingElement.innerHTML = `<b>BOB:</b> Server error. Please try again.`;

}

chatBox.scrollTop = chatBox.scrollHeight;

}

function formatText(text){

return text

/* bold */
.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")

/* headings */
.replace(/^### (.*$)/gim,"<h3>$1</h3>")
.replace(/^## (.*$)/gim,"<h2>$1</h2>")
.replace(/^# (.*$)/gim,"<h1>$1</h1>")

/* bullet points */
.replace(/^- (.*$)/gim,"<li>$1</li>")

/* line breaks */
.replace(/\n/g,"<br>")

/* wrap list items */
.replace(/(<li>.*<\/li>)/g,"<ul>$1</ul>");

}

</script>

</body>
</html>
